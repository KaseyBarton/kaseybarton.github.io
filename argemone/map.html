/*
addSitesAndJump()
Adds placemarks at sites from Google Sheets and jumps to relevant bounds.
*/
  
function addSitesAndJump ( skip_jump ) {

  // Which Google Sheets spreadsheet?:

  var spreadsheet_id = document.getElementById( 'sites' ).value;

  // Icon size?:

  var style_id = document.getElementById( 'icon' ).value;

  var dataset = document.getElementById( 'sites' )[ document.getElementById( 'sites' ).selectedIndex ].innerHTML;

  // Swap pull-down list of available species and zoom locations for the region:

  swapSpeciesList( dataset );
  swapZoomList( dataset );

  // Is a particular species selected?:

  var query_column = '';
  var query_value = '';

  if ( spreadsheet_id ) {
    var species = document.getElementById( 'species_' + dataset ).value;

    if ( species ) {

      if ( species == 'undefined' ) {
        species = '';
      }

      query_column = 'Species'; 
      query_value = species;
    }
  }

  // Add sites to map:

  addSites( spreadsheet_id, style_id, query_column, query_value ); 

  // Zoom to this dataset?:

  if ( !skip_jump ) {
    jumpTo( dataset );
  }

} // addSitesAndJump()


/*
swapSpeciesList()
After the user selects a different Google Sheets table (e.g. USA or Mexico),
show the appropriate pull-down list of available species names.
*/

function swapSpeciesList ( dataset ) {

  // Hide all species select lists except for selected dataset:

  var species_lists = document.getElementsByName( 'species_list' );

  for ( var i = 0; i < species_lists.length; i++ ) {
    if ( species_lists[ i ].id == 'species_' + dataset ) {
      species_lists[ i ].style.display = '';
    }
    else {
      species_lists[ i ].style.display = 'none';
    }
  }

} // swapSpeciesList()


/*
swapZoomList()
After the user selects a different Google Sheets table (e.g. USA or Mexico),
show the appropriate pull-down list of available zoom-to locations (states).
*/

function swapZoomList ( dataset ) {

  // Hide all zoom select lists except for selected dataset:

  var zoom_lists = document.getElementsByName( 'zoom_list' );

  for ( var i = 0; i < zoom_lists.length; i++ ) {
    if ( zoom_lists[ i ].id == 'zoom_' + dataset ) {
      zoom_lists[ i ].selectedIndex = 0;
      zoom_lists[ i ].style.display = '';
    }
    else {
      zoom_lists[ i ].style.display = 'none';
    }
  }

  // If there is no selected dataset, show the default (combined) list instead:

  if ( dataset != 'Mexico'
    && dataset != 'USA' ) {
    document.getElementById( 'zoom' ).selectedIndex = 0;
    document.getElementById( 'zoom' ).style.display = '';
  }

} // swapZoomList()

  else if ( location == "Washington" ) {
    sw = new google.maps.LatLng( 45.5430923699, -124.732769313 );
    ne = new google.maps.LatLng( 48.9999313731, -116.919132305 );
  }
  else if ( location == "West Virginia" ) {
    sw = new google.maps.LatLng( 37.2049103621, -82.6471582734 );
    ne = new google.maps.LatLng( 40.6372033653, -77.7274672688 );
  }
  else if ( location == "Wisconsin" ) {
    sw = new google.maps.LatLng( 42.489152367, -92.8853972829 );
    ne = new google.maps.LatLng( 46.9524793712, -86.9677122774 );
  }
  else if ( location == "Wyoming" ) {
    sw = new google.maps.LatLng( 40.9942893656, -111.0534283 );
    ne = new google.maps.LatLng( 45.0027933694, -104.051705293 );
  }

  else {
    return false;
  }

  // Compute latlng bounding box:

  bounds = new google.maps.LatLngBounds( sw, ne );

  // If not specified above, define center as center of above max bounding box:

  if ( !center ) {
    center = bounds.getCenter();
  }

  // Set map to specified center point and bounds:

  map.fitBounds( bounds );
  map.setCenter( center );

} // jumpTo()

</script>
