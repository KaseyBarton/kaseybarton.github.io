<script>

jQuery( document ).ready(
  function () {

    // Initiate map centered on Hawaii: 

    var sw = new google.maps.LatLng( 18.5941, -160.4498 );
    var ne = new google.maps.LatLng( 22.4364, -154.5996 );
    var bounds = new google.maps.LatLngBounds( sw, ne );
    var zoom = 8;

    loadMap( bounds, zoom );
  }
); // ready()

</script>

  <option value="usgs_geologic_age_hawaii_kauai2.kmz">&nbsp;&nbsp;&nbsp;Kauai</option>
  <option value="usgs_geologic_age_hawaii_mauinui2.kmz">&nbsp;&nbsp;&nbsp;Maui County</option>
  <option value="usgs_geologic_age_hawaii_oahu2.kmz">&nbsp;&nbsp;&nbsp;Oahu</option>
  <option value="usgs_geologic_age_hawaii_statewide2.kmz">&nbsp;&nbsp;&nbsp;Statewide</option>
  <option value="" class="highlightedOption" disabled>elevation:</option>
  <option value="usgs_elevation_hawaii_bigisland2.kmz">&nbsp;&nbsp;&nbsp;Big Island</option>
  <option value="usgs_elevation_hawaii_kauai2.kmz">&nbsp;&nbsp;&nbsp;Kauai</option>
  <option value="usgs_elevation_hawaii_lanai2.kmz">&nbsp;&nbsp;&nbsp;Lanai</option>

<select id="sites" onChange="addSites( this.value, document.getElementById( 'icon' ).value ); this.blur();">

</select>

  <option value="small">small</option>
  <option value="large">large</option>

<input type="button" id="enterCoordinatesButton" value="enter coordinates" onClick="document.getElementById( 'enterCoordinates' ).style.display = 'block'" style="margin-left: 2px;" />
