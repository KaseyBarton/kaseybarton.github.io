<select id="island" onChange="updateIsland( this.value ); this.blur();">
  <option selected disabled>Which island?</option>
  <option value="all">All</option>
  <option value="Big Island">Big Island</option>
  <option value="Kauai">Kauai</option>
  <option value="Maui">Maui</option>
  <option value="Molokai">Molokai</option>
  <option value="Oahu">Oahu</option>
</select>

<select id="variable" onChange="updateVariable( this.value ); this.blur();">
  <option selected disabled>Which variable?</option>
  <option value="Annual Rainfall (mm)">Annual Rainfall (mm)</option>
  <option value="Annual Rainfall (inches)">Annual Rainfall (inches)</option> 
  <option value="Elevation (m)">Elevation (m)</option>
  <option value="Elevation (ft)">Elevation (ft)</option>
  <option value="Geologic Age (1=young, 14=old)">Geologic Age (1=young, 14=old)</option>
  <option class="highlightedOption" disabled>scatter plots:</option>
  <option value="Annual Rainfall (mm) vs. Elevation (m)">Annual Rainfall (mm) vs. Elevation (m)</option>
  <option value="Annual Rainfall (inches) vs. Elevation (ft)">Annual Rainfall (inches) vs. Elevation (ft)</option>
</select>

<select id="orderBy" onChange="updateOrderBy( this.value ); this.blur();">
  <option selected disabled>Order by?</option>
  <option value="variable">Data Value</option>
  <option value="Site">Site Name</option>
</select>

<select id="orderDir" onChange="updateOrderDir( this.value ); this.blur();">
  <option selected disabled>Direction?</option>
  <option value="ASC">Ascending</option>
  <option value="DESC">Descending</option>
</select>
